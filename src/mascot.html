<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Mascot</title>
  <link rel="stylesheet" href="mascot.css" />
</head>
<body>
  <div id="mascot-wrapper">
    <div id="stage">
      <div id="speech-bubble" class="hidden"></div>
      <div id="tool-confirm-dialog" class="hidden">
        <div class="tc-title">編集確認</div>
        <pre id="tc-detail"></pre>
        <div class="tc-buttons">
          <button id="tc-approve">実行</button>
          <button id="tc-cancel">キャンセル</button>
        </div>
      </div>
      <img id="character-img" src="assets/character/kagami.png" alt="character" />
    </div>
    <div id="input-area">
      <textarea id="input" placeholder="メッセージを入力..." rows="1"></textarea>
      <button id="send">送信</button>
    </div>
  </div>
  <script src="mascot.js"></script>
</body>
</html>
